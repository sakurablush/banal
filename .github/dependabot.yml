version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    # Prioritize security updates
    # This will create PRs for vulnerable dependencies automatically

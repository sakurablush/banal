name: Labeler

# Auto-labels PRs based on changed paths.
# Free for public repos, no extra cost.
# Complementary to Dependabot (which already adds `dependencies`).

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          fail-on-error: false
